<!DOCTYPE html><html lang="en">
<head>  <meta charset="UTF-8">  <!-- Mobile Responsive -->  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Title -->  <title>Tasbeeh Pro</title>  <!-- Description -->  <meta name="description" content="Tasbeeh Pro - Digital Zikr Counter App">  <!-- Theme Color -->  <meta name="theme-color" content="#22c55e">  <!-- App Icon -->  <link rel="icon" href="icon.png">  <!-- CSS File -->  <link rel="stylesheet" href="style.css"></head>
   <body>  <!-- DONE MESSAGE -->  <div id="doneMsg">Tasbeeh Completed ✅</div>  <!-- TOP BUTTONS -->  <div class="top-buttons">
    <button onclick="changeTheme()">🎨</button>
    <button onclick="toggleMode()">🌙</button>
  </div>
  <!-- MAIN CONTAINER -->  <div class="container"><div class="card">

  <h1>🕌 Tasbeeh Counter</h1>

  <!-- Zikr -->
  <p id="zikr">SubhanAllah</p>

  <!-- Count -->
  <h2 id="count">0</h2>

  <!-- Limit -->
  <select id="limit">
    <option value="33">33</option>
    <option value="99">99</option>
    <option value="100">100</option>
    <option value="200">200</option>
    <option value="250">250</option>
    <option value="500">500</option>
    <option value="1000">1000</option>
    <option value="10000">10000</option>
  </select>

</div>

  </div>
  <!-- BUTTONS -->  <div class="buttons">

    <button onclick="increase()">Count</button>

    <button onclick="reset()" class="reset">Reset</button>

    <button onclick="changeZikr()">Change Zikr</button>

  </div>
  </div>
  </div>  <!-- ADD ZIKR -->  <div class="add-zikr">
    <input type="text" id="newZikr" placeholder="Enter your zikr...">
    <button onclick="addZikr()">Add</button>
  </div>  <!-- FLOATING BUTTONS --><button class="fab left" onclick="reset()">↻</button>
<button class="fab right" onclick="increase()">+</button>

  <!-- JS FILE -->  <script src="script.js"></script>
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("Service Worker Registered"));
  }
</script>
  </body>
</html>
